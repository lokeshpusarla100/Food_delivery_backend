server:
  port: 8761

spring:
  application:
    name: discovery-service

eureka:
  instance:
    hostname: localhost
  client:
    # I am the server, I don't need to register with myself
    register-with-eureka: false
    fetch-registry: false
    serviceUrl:
      defaultZone: http://${eureka.instance.hostname}:${server.port}/eureka/
  server:
    # Optimization: Turn off preservation mode for dev (removes stale services faster)
    enable-self-preservation: false
    wait-time-in-ms-when-sync-empty: 5